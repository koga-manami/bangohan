<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ばんごはん.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- フォント読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* セーフエリア対応 */
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }
        body {
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            padding-left: var(--sal);
            padding-right: var(--sar);
            -webkit-overflow-scrolling: touch;
        }
        /* stickyヘッダーのtop位置をセーフエリア分ずらす */
        .sticky-header {
            top: var(--sat);
        }
        /* 編集可能セルのフォーカススタイル */
        td[contenteditable="true"]:focus {
            outline: 2px solid #3B82F6;
            outline-offset: -2px;
            background-color: #EFF6FF;
        }
        .memo-area:focus {
            outline: 2px solid #3B82F6;
            outline-offset: -2px;
            background-color: #EFF6FF;
        }
    </style>
</head>
<body class="bg-white min-h-screen">

    <!-- ヘッダー -->
    <header class="sticky-header sticky z-50 text-white text-center py-3" style="background-color: #555555;">
        <h1 class="text-2xl tracking-wide" style="font-family: 'HGS創英角ｺﾞｼｯｸUB', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; font-weight: 900;">
            ばんごはん.com
        </h1>
    </header>

    <!-- メモエリア（sticky固定・タップで編集可能） -->
    <div class="sticky z-40 bg-white px-3 py-2" id="memo-wrapper" style="top: calc(var(--sat) + 48px);">
        <div class="memo-area bg-white border border-gray-300 rounded-xl px-4 py-6 text-base min-h-[60px]"
             contenteditable="true"
             id="ingredients-memo"
        >{{ ingredients|default:"" }}</div>
    </div>

    <!-- 献立リスト -->
    <div class="px-3 pb-8" id="dinner-list">
        <table class="w-full border-collapse border border-gray-400 text-sm table-fixed">
            <colgroup>
                <col style="width: 72px;">
                <col style="width: 72px;">
                <col>
            </colgroup>
            <tbody>
                {% for day in days %}
                <tr class="border border-gray-300" {% if day.date == today %}id="today-row"{% endif %}>
                    <td class="border border-gray-300 px-2 py-2 whitespace-nowrap text-center"
                        style="color: {{ day.color }}; font-family: 'Meiryo', 'メイリオ', 'Hiragino Kaku Gothic ProN', sans-serif;">
                        {{ day.date_label }}
                    </td>
                    <td class="border border-gray-300 px-2 py-2"
                        contenteditable="true"
                        data-date="{{ day.date|date:'Y-m-d' }}"
                        data-field="event"
                    >{{ day.event }}</td>
                    <td class="border border-gray-300 px-2 py-2"
                        contenteditable="true"
                        data-date="{{ day.date|date:'Y-m-d' }}"
                        data-field="kondate"
                    >{{ day.kondate }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    {% csrf_token %}
    <script>
    // CSRF トークン取得
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    // 献立セルの保存（フォーカスが外れたとき）
    const dinnerCells = document.querySelectorAll('td[contenteditable="true"][data-date]');
    const saveTimers = {};

    dinnerCells.forEach(cell => {
        cell.addEventListener('blur', function() {
            const dateStr = this.dataset.date;
            const eventCell = document.querySelector('td[data-date="' + dateStr + '"][data-field="event"]');
            const kondateCell = document.querySelector('td[data-date="' + dateStr + '"][data-field="kondate"]');

            const payload = {
                date: dateStr,
                event: eventCell ? eventCell.textContent.trim() : '',
                kondate: kondateCell ? kondateCell.textContent.trim() : '',
            };

            clearTimeout(saveTimers[dateStr]);
            saveTimers[dateStr] = setTimeout(() => {
                fetch('/api/dinner/save/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken,
                    },
                    body: JSON.stringify(payload),
                });
            }, 300);
        });
    });

    // メモエリアの保存（フォーカスが外れたとき）
    const memoArea = document.getElementById('ingredients-memo');
    let memoTimer = null;

    memoArea.addEventListener('blur', function() {
        const text = this.textContent.trim();
        clearTimeout(memoTimer);
        memoTimer = setTimeout(() => {
            fetch('/api/ingredients/update/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken,
                },
                body: JSON.stringify({ ingredients: text }),
            });
        }, 300);
    });

    // 初期表示時に当日の行までスクロール
    const todayRow = document.getElementById('today-row');
    if (todayRow) {
        todayRow.scrollIntoView({ behavior: 'instant', block: 'start' });
    }
    </script>

</body>
</html>
